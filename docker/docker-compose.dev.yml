services:
  postgres:
    image: postgres:16-alpine
    container_name: quicc-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    container_name: quicc-api
    build:
      context: ../backend
      target: dev
    environment:
      APP_ENV: dev
      DB_HOST: 
      DB_PORT:
      DB_USER: 
      DB_NAME: 
      SERVER_PORT: 
      LOG_LEVEL:
      LOG_OUTPUT: 
      LOG_STYLE: 
      DB_PASSWORD:
      AWS_REGION:
      AWS_ACCESS_KEY_ID:
      AWS_SECRET_ACCESS_KEY:
      SQS_QUEUE_URL:
      SQS_ENDPOINT:
      ADMIN_PASSCODE:
    restart: unless-stopped
    volumes:
      - ../backend:/src
      - ~/.aws:/root/.aws:ro
    ports:
      - "${SERVER_PORT:-1323}:1323"
    depends_on:
      postgres:
        condition: service_healthy

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    container_name: quicc-local-sqs
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
    ports:
      # REST API port 
      - "9324:9324"
    restart: unless-stopped

  elasticmq-ui:
    image: softwaremill/elasticmq-ui:latest
    container_name: quicc-local-sqs-ui
    ports:
      # Web UI port
      - "3000:3000"
    restart: unless-stopped
    environment:
      SQS_ENDPOINT: http://elasticmq:9324
    depends_on:
      - elasticmq

  pgadmin:
    image: dpage/pgadmin4
    container_name: quicc-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: 
      PGADMIN_DEFAULT_PASSWORD:
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
