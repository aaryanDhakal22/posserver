services:
  postgres:
    image: postgres:16-alpine
    container_name: quicc-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    container_name: quicc-api
    build:
      context: ../backend
      target: runtime
    environment:
      APP_ENV: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: pguser
      DB_NAME: pgdb
      SERVER_PORT: ${SERVER_PORT:-1323}
      LOG_LEVEL: debug
      LOG_OUTPUT: standard
      LOG_STYLE: json
      # From doppler 
      DB_PASSWORD:
      AWS_REGION:
      AWS_ACCESS_KEY_ID:
      AWS_SECRET_ACCESS_KEY:
      SQS_QUEUE_URL:
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-1323}:1323"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.posserver.rule=Host(`main.quiccpos.com`)"
      - "traefik.http.routers.posserver.entrypoints=websecure"
      - "traefik.http.routers.posserver.tls=true"
      - "traefik.http.routers.posserver.tls.certresolver=cloudflare"
      - "traefik.http.services.posserver.loadbalancer.server.port=1323"

networks:
  proxy:
    external: true

volumes:
  postgres_data:
