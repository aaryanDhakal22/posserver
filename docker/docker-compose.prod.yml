services:
  postgres:
    image: postgres:16-alpine
    container_name: quicc-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    container_name: quicc-api
    build:
      context: ../backend
      target: prod
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
    restart: unless-stopped
    volumes:
      - ../backend:/src
      - ~/.aws:/root/.aws:ro
    ports:
      - "${SERVER_PORT:-1323}:1323"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
