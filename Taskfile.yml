version: "3"

vars:
  DEV_CONFIG: ./docker/docker-compose.dev.yml
  ENV_FILE: .env

tasks:
  devup:
    desc: Start the development environment
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}} up

  devdown:
    desc: Stop the development environment
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}} down

  devupd:
    desc: Start the development environment in detached mode
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}} up -d

  devrestart:
    desc: Restart the development environment
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}} down
      - doppler run -- docker compose -f {{.DEV_CONFIG}} up

  devreset:
    desc: Reset the development environment (removes containers and images)
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}} down
      - doppler run -- docker compose -f {{.DEV_CONFIG}} down --rmi all
      - doppler run -- docker compose -f {{.DEV_CONFIG}} up --build

  dev-del-volumes:
    desc: Delete all volumes (wipes Postgres data)
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}} down -v

  dev-config:
    desc: Print the resolved docker-compose config
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}} config

  dev-logs:
    desc: "Tail logs for a service: task dev-logs -- api"
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}} logs {{.CLI_ARGS}}

  transport-deploy:
    desc: Transport deploy folder to the server
    cmds:
      - scp -r ./deploy/. homelab@zephyrus-prod:/srv/containers/posserver/

  devmigrate:
    desc: Run database migrations manually (requires postgres to be running)
    cmds:
      - goose -dir backend/internal/migrate/sql postgres "host=localhost port=5432 user={{.DB_USER}} password={{.DB_PASSWORD}} dbname={{.DB_NAME}} sslmode=disable" up
    vars:
      DB_USER:
        sh: grep ^DB_USER {{.ENV_FILE}} | cut -d= -f2
      DB_PASSWORD:
        sh: grep ^DB_PASSWORD {{.ENV_FILE}} | cut -d= -f2
      DB_NAME:
        sh: grep ^DB_NAME {{.ENV_FILE}} | cut -d= -f2
