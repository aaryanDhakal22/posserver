version: "3"

vars:
  DEV_CONFIG: ./docker/docker-compose.dev.yml
  PROD_CONFIG: ./docker/docker-compose.prod.yml
  ENV_FILE: .env

tasks:
  default:
    desc: Print a greeting message
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  produp:
    desc: Start the production environment
    cmds:
      - doppler run -- docker compose -f {{.PROD_CONFIG}}  up

  proddown:
    desc: Stop the production environment
    cmds:
      - doppler run -- docker compose -f {{.PROD_CONFIG}}  down

  produpd:
    desc: Start the production environment in detached mode
    cmds:
      - doppler run -- docker compose -f {{.PROD_CONFIG}}  up -d

  prodrestart:
    desc: Restart the production environment
    cmds:
      - doppler run -- docker compose -f {{.PROD_CONFIG}}  down
      - doppler run -- docker compose -f {{.PROD_CONFIG}}  up

  prodreset:
    desc: Reset the production environment
    cmds:
      - doppler run -- docker compose -f {{.PROD_CONFIG}}  down
      - doppler run -- docker compose -f {{.PROD_CONFIG}} down --rmi all
      - doppler run -- docker compose -f {{.PROD_CONFIG}}  up --build

  devup:
    desc: Start the development environment
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}}  up

  devdown:
    desc: Stop the development environment
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}}  down

  devupd:
    desc: Start the development environment in detached mode
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}}  up -d

  devrestart:
    desc: Restart the development environment
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}}  down
      - doppler run -- docker compose -f {{.DEV_CONFIG}}  up

  devreset:
    desc: Reset the development environment
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}}  down
      - doppler run -- docker compose -f {{.DEV_CONFIG}} down --rmi all
      - doppler run -- docker compose -f {{.DEV_CONFIG}}  up --build

  dev-del-volumes:
    desc: Delete all volumes
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}}  down -v

  dev-config:
    desc: See all the configurations
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}}  config

  dev-logs:
    desc: See logs of the containers passed as argument
    cmds:
      - doppler run -- docker compose -f {{.DEV_CONFIG}}  logs {{.CLI_ARGS}}

  devmigrate:
    desc: Run database migrations manually (requires postgres to be running)
    cmds:
      - goose -dir backend/internal/migrate/sql postgres "host=localhost port=5432 user={{.DB_USER}} password={{.DB_PASSWORD}} dbname={{.DB_NAME}} sslmode=disable" up
    vars:
      DB_USER:
        sh: grep ^DB_USER {{.ENV_FILE}} | cut -d= -f2
      DB_PASSWORD:
        sh: grep ^DB_PASSWORD {{.ENV_FILE}} | cut -d= -f2
      DB_NAME:
        sh: grep ^DB_NAME {{.ENV_FILE}} | cut -d= -f2

  gen-env:
    desc: Generate .env file
    cmds:
      - touch {{.ENV_FILE}}
      - echo "APP_ENV=development" >> {{.ENV_FILE}}
      - echo "LOG_LEVEL=info" >> {{.ENV_FILE}}
      - echo "LOG_OUTPUT=standard" >> {{.ENV_FILE}}
      - echo "LOG_STYLE=json" >> {{.ENV_FILE}}
      - echo "SERVER_PORT=1323" >> {{.ENV_FILE}}
  #
  # transport-env:
  #   desc: Send the .env file to production
  #   cmds: 
  #     - scp {{.ENV_FILE}} lightsail-api:~
  #
  # transport-compose:
  #   desc: Send the docker-compose file to production
  #   cmds: 
  #     - scp {{.PROD_CONFIG}} lightsail-api:/opt/ingest/docker-compose.yml
